<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" xml:space="preserve">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B2E58"/>
      <stop offset="100%" style="stop-color:#071D3A"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4B878"/>
      <stop offset="40%" style="stop-color:#F0D88A"/>
      <stop offset="100%" style="stop-color:#C8A45C"/>
    </linearGradient>
    <clipPath id="shieldClip">
      <path d="M256,40 L448,128 L448,280 C448,390 360,470 256,500 C152,470 64,390 64,280 L64,128 Z"/>
    </clipPath>
  </defs>

  <!-- Shield outline -->
  <path d="M256,40 L448,128 L448,280 C448,390 360,470 256,500 C152,470 64,390 64,280 L64,128 Z" 
        fill="url(#bgGrad)" stroke="url(#goldGrad)" stroke-width="8"/>

  <!-- Guinea tricolor vertical stripes (translucent inside shield) -->
  <g clip-path="url(#shieldClip)">
    <rect x="64" y="40" width="128" height="470" fill="#CE1126" opacity="0.15"/>
    <rect x="192" y="40" width="128" height="470" fill="#FCD116" opacity="0.12"/>
    <rect x="320" y="40" width="128" height="470" fill="#009460" opacity="0.15"/>
  </g>

  <!-- Large gold star (Guinea national emblem) -->
  <polygon points="256,100 280,176 360,176 296,224 320,300 256,252 192,300 216,224 152,176 232,176" 
           fill="url(#goldGrad)"/>

  <!-- eA text -->
  <text x="256" y="400" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" 
        font-weight="bold" font-size="80" fill="white" opacity="0.95">eA</text>
</svg>
