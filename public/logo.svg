<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" style="enable-background:new 0 0 120 120;" xml:space="preserve">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0B2E58;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#071D3A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4B878;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F0D88A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C8A45C;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Shield shape -->
  <path d="M60,8 L104,28 L104,60 C104,84 84,104 60,112 C36,104 16,84 16,60 L16,28 Z" fill="url(#shieldGrad)" stroke="url(#goldShine)" stroke-width="2.5"/>

  <!-- Guinea tricolor vertical stripes inside shield -->
  <clipPath id="shieldClip">
    <path d="M60,12 L100,30 L100,60 C100,81 82,99 60,107 C38,99 20,81 20,60 L20,30 Z"/>
  </clipPath>
  <g clip-path="url(#shieldClip)">
    <rect x="20" y="12" width="27" height="100" fill="#CE1126" opacity="0.18"/>
    <rect x="47" y="12" width="26" height="100" fill="#FCD116" opacity="0.15"/>
    <rect x="73" y="12" width="27" height="100" fill="#009460" opacity="0.18"/>
  </g>

  <!-- Gold star -->
  <polygon points="60,28 64.5,41 78,41 67,49.5 71,63 60,54.5 49,63 53,49.5 42,41 55.5,41" fill="url(#goldShine)"/>

  <!-- eA monogram -->
  <text x="60" y="90" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="22" fill="white" opacity="0.95">eA</text>

  <!-- Subtle breathing animation on star -->
  <style>
    .star-breathe {
      animation: breathe 3s ease-in-out infinite;
    }
    @keyframes breathe {
      0%, 100% { opacity: 0.85; }
      50% { opacity: 1; }
    }
  </style>
</svg>
