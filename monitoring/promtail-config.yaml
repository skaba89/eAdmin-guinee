# =============================================================================
# Promtail Configuration - eAdministration Suite Guinea
# Agent de collecte de logs pour Loki
# =============================================================================

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: eadmin-backend
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.docker.compose.service=backend"]
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        target_label: 'container'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'
    pipeline_stages:
      - json:
          expressions:
            level: level
            module: module
            message: message
            time: time
      - labels:
          level:
          module:
      - timestamp:
          source: time
          format: RFC3339

  - job_name: eadmin-frontend
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.docker.compose.service=frontend"]
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        target_label: 'container'
    pipeline_stages:
      - labels:
          container:

  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: system
          host: eadmin-server
          __path__: /var/log/*.log
