global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'eadmin-backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['backend:8000']
        labels:
          service: 'eadmin-backend'
          env: 'production'

  - job_name: 'eadmin-postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'eadmin-redis'
    static_configs:
      - targets: ['redis-exporter:9121']
