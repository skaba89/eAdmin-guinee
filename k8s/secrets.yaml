# =============================================================================
# Secrets - eAdmin Guinée
# ⚠️ This is a TEMPLATE — use Sealed Secrets or External Secrets Operator in production
# ⚠️ NEVER commit real secret values
#
# All values must be base64-encoded. Generate them with:
#   echo -n "your-secret-value" | base64
#
# For production, replace CHANGE_ME with real base64-encoded values.
# Example generation commands:
#   python -c "import secrets; print(secrets.token_urlsafe(48))"  # SECRET_KEY, ENCRYPTION_KEY
#   openssl rand -base64 32                                       # Passwords
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: eadmin-secrets
  namespace: eadmin
type: Opaque
data:
  # --- Database ---
  # PostgreSQL connection string (base64 of: postgresql+asyncpg://eadmin:<password>@postgres:5432/eadmin)
  DATABASE_URL: CHANGE_ME

  # --- JWT / Security ---
  # Secret key for JWT token signing
  # Generate: python -c "import secrets; print(secrets.token_urlsafe(48))"
  SECRET_KEY: CHANGE_ME

  # --- Encryption ---
  # AES-256-GCM encryption key for sensitive data at rest
  # Generate: python -c "import secrets; print(secrets.token_urlsafe(32))"
  ENCRYPTION_KEY: CHANGE_ME

  # --- Redis ---
  # Redis connection URL with password (base64 of: redis://:<password>@redis:6379)
  REDIS_URL: CHANGE_ME

  # Redis password (used by redis deployment)
  # Generate: openssl rand -base64 32
  REDIS_PASSWORD: CHANGE_ME

  # --- MinIO / S3 Object Storage ---
  # MinIO root user / access key
  # Generate: openssl rand -hex 16
  MINIO_ACCESS_KEY: CHANGE_ME

  # MinIO root password / secret key
  # Generate: openssl rand -base64 32
  MINIO_SECRET_KEY: CHANGE_ME
