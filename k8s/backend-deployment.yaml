apiVersion: apps/v1
kind: Deployment
metadata:
  name: eadmin-backend
  namespace: eadmin
  labels:
    app: eadmin-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: eadmin-backend
  template:
    metadata:
      labels:
        app: eadmin-backend
    spec:
      containers:
        - name: backend
          image: eadmin/backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: eadmin-secrets
            - configMapRef:
                name: eadmin-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: eadmin-backend
  namespace: eadmin
spec:
  selector:
    app: eadmin-backend
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
