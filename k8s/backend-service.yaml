# =============================================================================
# Service - eAdmin Guinée Backend
# ClusterIP service for internal cluster communication
# Frontend and other services connect to the backend via this service
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: eadmin-backend
  namespace: eadmin
  labels:
    app: eadmin-backend
    tier: backend
spec:
  type: ClusterIP
  selector:
    app: eadmin-backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
