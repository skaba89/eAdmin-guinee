# =============================================================================
# Docker Compose - eAdministration Suite Guinea
# Plateforme GovTech de nouvelle génération
# =============================================================================

version: "3.9"

services:
  # ------------------------------------------------------------------
  # Base de données PostgreSQL 16
  # ------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: eadmin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: eadmin
      POSTGRES_USER: eadmin
      POSTGRES_PASSWORD: eadmin
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eadmin -d eadmin"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - eadmin-network

  # ------------------------------------------------------------------
  # Cache Redis 7
  # ------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: eadmin-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eadmin-network

  # ------------------------------------------------------------------
  # Stockage objet MinIO (compatible S3)
  # ------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: eadmin-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eadmin-network

  # ------------------------------------------------------------------
  # API Backend FastAPI
  # ------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eadmin-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://eadmin:eadmin@postgres:5432/eadmin
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - eadmin-network

  # ------------------------------------------------------------------
  # Frontend Next.js
  # ------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eadmin-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_APP_NAME: eAdministration Suite Guinea
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - eadmin-network

# =====================================================================
# Réseaux
# =====================================================================
networks:
  eadmin-network:
    driver: bridge
    name: eadmin-network

# =====================================================================
# Volumes persistants
# =====================================================================
volumes:
  postgres_data:
    name: eadmin-postgres-data
  redis_data:
    name: eadmin-redis-data
  minio_data:
    name: eadmin-minio-data
