# =============================================================================
# Docker Compose - eAdministration Suite Guinea
# Plateforme GovTech de nouvelle génération
# All secrets MUST come from .env file — never hardcoded
# =============================================================================

version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: eadmin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: eadmin
      POSTGRES_USER: eadmin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eadmin -d eadmin"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - eadmin-network

  redis:
    image: redis:7-alpine
    container_name: eadmin-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eadmin-network

  minio:
    image: minio/minio:latest
    container_name: eadmin-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-eadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD required}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eadmin-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eadmin-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://eadmin:${POSTGRES_PASSWORD}@postgres:5432/eadmin
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY required}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-eadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      MFA_ISSUER: eAdmin Guinée
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - eadmin-network

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: eadmin-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    restart: unless-stopped
    networks:
      - eadmin-network

  grafana:
    image: grafana/grafana:10.4.0
    container_name: eadmin-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD required}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - eadmin-network

  loki:
    image: grafana/loki:2.9.4
    container_name: eadmin-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yaml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - eadmin-network

  promtail:
    image: grafana/promtail:2.9.4
    container_name: eadmin-promtail
    restart: unless-stopped
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./monitoring/promtail-config.yaml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - eadmin-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eadmin-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_APP_NAME: eAdministration Suite Guinea
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - eadmin-network

networks:
  eadmin-network:
    driver: bridge
    name: eadmin-network

volumes:
  postgres_data:
    name: eadmin-postgres-data
  redis_data:
    name: eadmin-redis-data
  minio_data:
    name: eadmin-minio-data
  prometheus_data:
    name: eadmin-prometheus-data
  grafana_data:
    name: eadmin-grafana-data
  loki_data:
    name: eadmin-loki-data
