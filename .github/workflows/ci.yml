# =============================================================================
# GitHub Actions CI/CD - eAdministration Suite Guinea
# Pipeline d'intégration et de déploiement continu
# =============================================================================

name: CI/CD - eAdministration Suite Guinea

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: ${{ github.repository }}/backend
  IMAGE_NAME_FRONTEND: ${{ github.repository }}/frontend

jobs:
  # -----------------------------------------------------------------
  # Job 1 : Vérification du code (lint, type-check)
  # -----------------------------------------------------------------
  lint-and-typecheck:
    name: Lint & Type-check
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Configurer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Installer les dépendances frontend
        run: npm ci

      - name: Vérification ESLint
        run: npm run lint

      - name: Vérification TypeScript
        run: npx tsc --noEmit

  # -----------------------------------------------------------------
  # Job 2 : Build du frontend
  # -----------------------------------------------------------------
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Configurer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Installer les dépendances
        run: npm ci

      - name: Build de production
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_APP_NAME: eAdministration Suite Guinea

  # -----------------------------------------------------------------
  # Job 3 : Test du backend Python
  # -----------------------------------------------------------------
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Configurer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Vérification des imports
        run: python -c "from app.main import app; print('✅ Imports OK')"

  # -----------------------------------------------------------------
  # Job 4 : Build Docker
  # -----------------------------------------------------------------
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [build-frontend, test-backend]

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Configurer Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build de l'image backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          load: true
          tags: eadmin-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Vérifier l'image backend
        run: docker run --rm eadmin-backend:test python -c "from app.main import app; print('✅ Backend image OK')"

      - name: Build de l'image frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: eadmin-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # -----------------------------------------------------------------
  # Job 5 : Déploiement (placeholder)
  # -----------------------------------------------------------------
  deploy:
    name: Déploiement
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: https://eadmin.gouv.gn

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Connexion au registre
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push de l'image backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push de l'image frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Déclencher le déploiement
        run: |
          echo "🚀 Déploiement déclenché pour l'environnement de production"
          echo "Image backend : ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:latest"
          echo "Image frontend : ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:latest"
          echo "⚠️ Configurez votre provider de déploiement ici (Kubernetes, Docker Swarm, etc.)"
