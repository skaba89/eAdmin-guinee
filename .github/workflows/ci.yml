# =============================================================================
# eAdministration Suite Guinea — CI/CD Pipeline
# GitHub Actions : lint, test backend, build frontend, test E2E
# =============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, feature/*]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"
  BUN_VERSION: "latest"

jobs:
  # --- Job 1 : Lint & Build Frontend ---
  frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint
        continue-on-error: true

      - name: Build
        run: bun run build
        env:
          DATABASE_URL: postgresql://eadmin:eadmin@localhost:5432/eadmin
          NEXT_PUBLIC_API_URL: http://localhost:8000

  # --- Job 2 : Tests Backend ---
  backend:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: eadmin_test
          POSTGRES_USER: eadmin
          POSTGRES_PASSWORD: eadmin
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements-dev.txt

      - name: Lint with Ruff
        run: |
          cd backend
          pip install ruff
          ruff check app/ tests/ --output-format=github
        continue-on-error: true

      - name: Run tests
        env:
          ENVIRONMENT: test
          DATABASE_URL: postgresql://eadmin:eadmin@localhost:5432/eadmin_test
          SECRET_KEY: test-secret-key-for-ci-only
          REDIS_URL: redis://localhost:6379
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/test-results.xml

  # --- Job 3 : Tests E2E ---
  e2e:
    name: E2E — Playwright Tests
    runs-on: ubuntu-latest
    needs: [frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Build frontend
        run: bun run build
        env:
          DATABASE_URL: postgresql://eadmin:eadmin@localhost:5432/eadmin

      - name: Start frontend server
        run: bun run start &
        env:
          DATABASE_URL: postgresql://eadmin:eadmin@localhost:5432/eadmin

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 30000

      - name: Run E2E tests
        run: bunx playwright test --reporter=html,json
        continue-on-error: true

      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: |
            playwright-report/
            test-results/

  # --- Job 4 : Docker Build Check ---
  docker:
    name: Docker — Build Check
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Check Docker Compose config
        run: docker compose config

      - name: Build backend image
        run: docker compose build backend

      - name: Build frontend image
        run: docker compose build frontend
