name: eAdmin Guinée CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ─── Backend Lint & Type Check ─────────────────────────────
  backend-lint:
    name: Backend Lint & Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Ruff lint
        run: ruff check app/ tests/
      - name: MyPy type check
        run: mypy app/ --ignore-missing-imports || true

  # ─── Backend Tests ──────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: backend-lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: eadmin_test
          POSTGRES_USER: eadmin
          POSTGRES_PASSWORD: test_password_123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql+asyncpg://eadmin:test_password_123@localhost:5432/eadmin_test
      SECRET_KEY: test-secret-key-for-ci-only
      REDIS_URL: redis://localhost:6379
      ENVIRONMENT: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing -x
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  # ─── Frontend Build ────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Type check
        run: npx tsc --noEmit || true
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_APP_NAME: eAdmin Test

  # ─── Security Scan ─────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for hardcoded secrets
        run: |
          # Check for common secret patterns
          ! rg -i "password\s*[:=]\s*['\"][^'\"]{8,}" --type py --type ts --type yml --type yaml || echo "⚠️ Potential hardcoded secrets found"
          ! rg -i "secret_key\s*[:=]\s*['\"][^'\"]{8,}" --type py || echo "⚠️ Potential hardcoded SECRET_KEY found"
          ! rg -i "api_key\s*[:=]\s*['\"][^'\"]{8,}" --type py --type ts || echo "⚠️ Potential hardcoded API_KEY found"
      - name: Python safety check
        run: |
          pip install safety
          safety check -r backend/requirements.txt || true

  # ─── Docker Build Test ─────────────────────────────────────
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t eadmin-backend:ci ./backend
      - name: Build frontend image
        run: docker build -t eadmin-frontend:ci .
