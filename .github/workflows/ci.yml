name: eAdmin Guinée CI/CD

on:
  push:
    branches: [main, develop, 'release/**']
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'
  POSTGRES_PASSWORD: ci-test-password
  REDIS_PASSWORD: ci-redis-password
  SECRET_KEY: ci-secret-key-for-testing-only

jobs:
  # ─── Code Quality ────────────────────────────────────────────────────────────
  backend-lint:
    name: Backend Lint & Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check app/ tests/

      - name: MyPy type check
        run: mypy app/ --ignore-missing-imports || true

      - name: Black format check
        run: black --check app/ tests/ || true

      - name: isort check
        run: isort --check-only app/ tests/ || true

  frontend-lint:
    name: Frontend Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: ESLint
        run: bun run lint || true

      - name: TypeScript type check
        run: npx tsc --noEmit || true

  # ─── Backend Tests ──────────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: backend-lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: eadmin_test
          POSTGRES_USER: eadmin
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql+asyncpg://eadmin:${{ env.POSTGRES_PASSWORD }}@localhost:5432/eadmin_test
      SECRET_KEY: ${{ env.SECRET_KEY }}
      REDIS_URL: redis://localhost:6379
      ENVIRONMENT: test
      ENCRYPTION_KEY: ci-encryption-key-for-testing-only-32chars
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing -x

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

      - name: Check coverage threshold
        run: |
          python -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          root = tree.getroot()
          rate = float(root.attrib.get('line-rate', 0))
          pct = rate * 100
          print(f'Coverage: {pct:.1f}%')
          if pct < 80:
              print('FAIL: Coverage below 80% threshold')
              exit(1)
          else:
              print('PASS: Coverage meets 80% threshold')
          "

  # ─── Frontend Build & Test ─────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: frontend-lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_APP_NAME: eAdmin Test

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: .next/

  # ─── Security Scanning ─────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH
        continue-on-error: true

      - name: Python safety check
        run: |
          pip install safety
          safety check -r backend/requirements.txt || true
        continue-on-error: true

      - name: npm audit (JS dependencies)
        run: |
          npm audit --audit-level=high || true
        continue-on-error: true

      - name: Gitleaks - detect hardcoded secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        continue-on-error: true

      - name: Check for hardcoded secrets with patterns
        run: |
          echo "=== Checking for hardcoded secrets ==="
          rg -i "password\s*[:=]\s*['\"][^'\"]{8,}" --type py --type ts --type yml --type yaml -l 2>/dev/null || echo "No hardcoded passwords found"
          rg -i "secret_key\s*[:=]\s*['\"][^'\"]{8,}" --type py -l 2>/dev/null || echo "No hardcoded SECRET_KEY found"
          rg -i "api_key\s*[:=]\s*['\"][^'\"]{8,}" --type py --type ts -l 2>/dev/null || echo "No hardcoded API_KEY found"
          rg -i "private_key.*BEGIN" --type py --type ts -l 2>/dev/null || echo "No embedded private keys found"
        continue-on-error: true

  # ─── E2E Tests ──────────────────────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: eadmin_test
          POSTGRES_USER: eadmin
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://eadmin:${{ env.POSTGRES_PASSWORD }}@localhost:5432/eadmin_test
      SECRET_KEY: ${{ env.SECRET_KEY }}
      REDIS_URL: redis://localhost:6379
      ENVIRONMENT: test
      ENCRYPTION_KEY: ci-encryption-key-for-testing-only-32chars
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install backend dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt -r backend/requirements-dev.txt

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build backend Docker image
        run: docker build -t eadmin-backend:ci ./backend

      - name: Build frontend Docker image
        run: docker build -t eadmin-frontend:ci .

      - name: Start services with docker-compose
        run: |
          docker network create eadmin-net || true
          docker run -d --name postgres --network eadmin-net \
            -e POSTGRES_DB=eadmin_test \
            -e POSTGRES_USER=eadmin \
            -e POSTGRES_PASSWORD=${{ env.POSTGRES_PASSWORD }} \
            -p 5432:5432 \
            postgres:16-alpine || true
          docker run -d --name redis --network eadmin-net \
            -p 6379:6379 \
            redis:7-alpine || true
        continue-on-error: true

      - name: Wait for health checks
        run: |
          echo "Waiting for services to be ready..."
          sleep 10
          # Check PostgreSQL
          for i in $(seq 1 30); do
            if docker exec postgres pg_isready -U eadmin 2>/dev/null; then
              echo "PostgreSQL is ready"
              break
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done
          # Check Redis
          for i in $(seq 1 30); do
            if docker exec redis redis-cli ping 2>/dev/null | grep -q PONG; then
              echo "Redis is ready"
              break
            fi
            echo "Waiting for Redis... ($i/30)"
            sleep 2
          done
        continue-on-error: true

      - name: Seed test data
        run: |
          cd backend && python seed_demo.py || true
        continue-on-error: true

      - name: Install Playwright
        run: npx playwright install --with-deps chromium
        continue-on-error: true

      - name: Run Playwright E2E tests
        run: npx playwright test || true
        continue-on-error: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-test-results
          path: |
            test-results/
            playwright-report/

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-screenshots
          path: test-results/**/screenshots/

  # ─── Docker Build Test ──────────────────────────────────────────────────────
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        run: docker build -t eadmin-backend:ci ./backend

      - name: Build frontend Docker image
        run: docker build -t eadmin-frontend:ci .

      - name: Test backend container starts
        run: |
          docker run -d --name backend-test \
            -e DATABASE_URL=postgresql+asyncpg://test:test@localhost:5432/test \
            -e SECRET_KEY=test-secret \
            -e REDIS_URL=redis://localhost:6379 \
            -e ENCRYPTION_KEY=test-encryption-key-32characters \
            -e MINIO_ACCESS_KEY=minioadmin \
            -e MINIO_SECRET_KEY=minioadmin \
            -p 8000:8000 \
            eadmin-backend:ci
          sleep 10
          docker logs backend-test
          docker stop backend-test || true

      - name: Test frontend container starts
        run: |
          docker run -d --name frontend-test \
            -p 3000:3000 \
            eadmin-frontend:ci
          sleep 10
          docker logs frontend-test
          docker stop frontend-test || true

  # ─── Integration Tests ──────────────────────────────────────────────────────
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: eadmin_test
          POSTGRES_USER: eadmin
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql+asyncpg://eadmin:${{ env.POSTGRES_PASSWORD }}@localhost:5432/eadmin_test
      SECRET_KEY: ${{ env.SECRET_KEY }}
      REDIS_URL: redis://localhost:6379
      ENVIRONMENT: test
      ENCRYPTION_KEY: ci-encryption-key-for-testing-only-32chars
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          pip install httpx pytest-asyncio

      - name: Run API integration tests
        run: |
          pytest tests/ -v -k "integration" --tb=short || echo "No integration tests found, skipping"
        continue-on-error: true

      - name: Run RBAC permission tests
        run: |
          pytest tests/test_rbac.py -v --tb=short || true
        continue-on-error: true

      - name: Run multi-tenant isolation tests
        run: |
          pytest tests/ -v -k "tenant" --tb=short || echo "No tenant tests found, skipping"
        continue-on-error: true

      - name: Run security penetration tests
        run: |
          pytest tests/test_auth_security.py -v --tb=short || true
        continue-on-error: true

  # ─── Deploy Staging (only on develop branch) ────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [security-scan, e2e-tests, docker-build]
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
        continue-on-error: true

      - name: Build and push backend image
        run: |
          docker build -t ${{ secrets.REGISTRY_URL }}/eadmin-backend:staging ./backend
          docker push ${{ secrets.REGISTRY_URL }}/eadmin-backend:staging || true
        continue-on-error: true

      - name: Build and push frontend image
        run: |
          docker build -t ${{ secrets.REGISTRY_URL }}/eadmin-frontend:staging .
          docker push ${{ secrets.REGISTRY_URL }}/eadmin-frontend:staging || true
        continue-on-error: true

      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          # kubectl set image deployment/eadmin-backend backend=${{ secrets.REGISTRY_URL }}/eadmin-backend:staging -n staging || true
          # kubectl set image deployment/eadmin-frontend frontend=${{ secrets.REGISTRY_URL }}/eadmin-frontend:staging -n staging || true
          # kubectl rollout status deployment/eadmin-backend -n staging --timeout=300s || true
          echo "Staging deployment complete (placeholder — configure kubectl for actual deployment)"

      - name: Notify deployment
        run: |
          echo "Staging deployment for commit ${{ github.sha }} on develop branch"
          # curl -X POST "${{ secrets.SLACK_WEBHOOK }}" -H 'Content-type: application/json' --data '{"text":"eAdmin Staging deployed: ${{ github.sha }}"}' || true

  # ─── Deploy Production (only on main branch, with approval) ─────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [security-scan, e2e-tests, docker-build, integration-test]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
        continue-on-error: true

      - name: Build and push backend image
        run: |
          docker build -t ${{ secrets.REGISTRY_URL }}/eadmin-backend:prod ./backend
          docker push ${{ secrets.REGISTRY_URL }}/eadmin-backend:prod || true
        continue-on-error: true

      - name: Build and push frontend image
        run: |
          docker build -t ${{ secrets.REGISTRY_URL }}/eadmin-frontend:prod .
          docker push ${{ secrets.REGISTRY_URL }}/eadmin-frontend:prod || true
        continue-on-error: true

      - name: Deploy to production
        run: |
          echo "Deploying to production environment..."
          # kubectl set image deployment/eadmin-backend backend=${{ secrets.REGISTRY_URL }}/eadmin-backend:prod -n production || true
          # kubectl set image deployment/eadmin-frontend frontend=${{ secrets.REGISTRY_URL }}/eadmin-frontend:prod -n production || true
          # kubectl rollout status deployment/eadmin-backend -n production --timeout=600s || true
          echo "Production deployment complete (placeholder — configure kubectl for actual deployment)"

      - name: Notify deployment
        run: |
          echo "Production deployment for commit ${{ github.sha }} on main branch"
          # curl -X POST "${{ secrets.SLACK_WEBHOOK }}" -H 'Content-type: application/json' --data '{"text":"🚨 eAdmin PRODUCTION deployed: ${{ github.sha }}"}' || true

      - name: Create release tag
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          body: |
            Production deployment from commit ${{ github.sha }}
            Deployed at ${{ github.event.head_commit.timestamp }}
        continue-on-error: true
