name: eAdmin Guinée — CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'

jobs:
  # ===========================================================================
  # Frontend Lint & Build
  # ===========================================================================
  frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Lint frontend
        run: bun run lint
        continue-on-error: true

      - name: Type check
        run: bunx tsc --noEmit
        continue-on-error: true

      - name: Build frontend
        run: bun run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  # ===========================================================================
  # Backend Lint & Test
  # ===========================================================================
  backend:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: eadmin
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: eadmin_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint backend with Ruff
        run: |
          ruff check app/ --ignore E501
        continue-on-error: true

      - name: Run backend tests (SQLite — fast, no external deps)
        env:
          ENVIRONMENT: test
          SECRET_KEY: test-secret-key-for-ci-do-not-use-in-production
        run: |
          python -m pytest tests/ -v --tb=short -x

      - name: Run backend tests with PostgreSQL (integration)
        env:
          ENVIRONMENT: test
          DATABASE_URL: postgresql://eadmin:test_password@localhost:5432/eadmin_test
          SECRET_KEY: test-secret-key-for-ci-do-not-use-in-production
          REDIS_URL: redis://localhost:6379
        run: |
          python -m pytest tests/ -v --tb=short
        continue-on-error: true

  # ===========================================================================
  # Docker Build Check
  # ===========================================================================
  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check frontend Docker build
        run: docker build -t eadmin-frontend-test .
        continue-on-error: true

      - name: Check backend Docker build
        run: docker build -t eadmin-backend-test ./backend
        continue-on-error: true

  # ===========================================================================
  # Security Scan
  # ===========================================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

      - name: Python dependency audit
        run: |
          pip install pip-audit
          cd backend
          pip-audit -r requirements.txt
        continue-on-error: true
